services:
  frontend:
    build:
      context: ..
      dockerfile: example_docker/Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    image: lumiere-frontend-nginx:latest
    container_name: lumiere-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    environment:
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM:-http://host.docker.internal:3001}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs/nginx:/var/log/nginx
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - lumiere-deployment

networks:
  lumiere-deployment:
    driver: bridge
